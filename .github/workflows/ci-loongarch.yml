name: LoongArch 64 Cross-Compile

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-loongarch64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: loongarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-loongarch64-linux-gnu g++-loongarch64-linux-gnu

      - name: Build native crate
        run: |
          export CC_loongarch64_unknown_linux_gnu=loongarch64-linux-gnu-gcc
          export CXX_loongarch64_unknown_linux_gnu=loongarch64-linux-gnu-g++
          export CARGO_TARGET_LOONGARCH64_UNKNOWN_LINUX_GNU_LINKER=loongarch64-linux-gnu-gcc
          cargo build --release --target loongarch64-unknown-linux-gnu -p cod-native
        working-directory: .

      - name: Build CLI
        run: |
          cargo build --release --target loongarch64-unknown-linux-gnu -p cod-cli
        working-directory: .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cod-loongarch64
          path: target/loongarch64-unknown-linux-gnu/release/cod-cli
