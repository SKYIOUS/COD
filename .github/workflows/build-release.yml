name: Build Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: win32-x64
        type: choice
        options:
          - win32-x64
          - win32-arm64
          - linux-x64
          - darwin-x64
          - darwin-arm64
      build_type:
        description: Build type
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
          - benchmark
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: write
  pull-requests: read

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        run: echo "version=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
        shell: bash
      - id: changelog
        run: |
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          echo "## Release $(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD 2>/dev/null | while read line; do echo "- $line"; done >> $GITHUB_OUTPUT || echo "- Initial release" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
        shell: bash

  build:
    needs: generate-changelog
    runs-on: ${{ (inputs.platform == 'win32-x64' || startsWith(github.ref_name, 'v') && endsWith(github.ref_name, 'win32')) && 'windows-latest' || (inputs.platform == 'linux-x64' || startsWith(github.ref_name, 'v') && endsWith(github.ref_name, 'linux')) && 'ubuntu-latest' || 'macos-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
            cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'native/Cargo.lock', 'cli/Cargo.lock') }}

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libxss-dev libasound2-dev
        shell: bash

      - name: Rust lint (clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings
        shell: bash

      - name: Build Rust native module (release)
        run: cargo build --release -p cod_native
        working-directory: native

      - name: Run Rust unit tests
        run: cargo test --release -p cod_native
        working-directory: native

      - name: npm install
        run: npm ci --prefer-offline

      - name: TypeScript compile
        run: npm run compile

      - name: TypeScript type-check
        run: npx tsc --noEmit --project src/tsconfig.json

      - name: Run unit tests
        run: npm run test -- --run --reporter dot
        timeout-minutes: 15

      - name: Lint check
        run: npm run lint
        continue-on-error: true

      - name: Build packaged app
        run: npm run gulp vscode-${{ inputs.platform || 'win32-x64' }}-min
        timeout-minutes: 45
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Sign executable (Windows)
        if: runner.os == 'Windows'
        run: |
          $cert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Select-Object -First 1
          if ($cert) { Set-AuthenticodeSignature -Certificate $cert -TimestampServer http://timestamp.digicert.com -FilePath (Get-ChildItem -Recurse .build/VSCode-${{ inputs.platform || 'win32-x64' }}/COD.exe).FullName }
        continue-on-error: true

      - name: Run smoke tests
        run: npm run smoketest -- --build .build/VSCode-${{ inputs.platform || 'win32-x64' }} --screenshots
        continue-on-error: true
        timeout-minutes: 10

      - name: Run performance benchmarks
        if: inputs.build_type == 'benchmark'
        run: npm run perf -- --build .build/VSCode-${{ inputs.platform || 'win32-x64' }}/COD.exe
        continue-on-error: true
        timeout-minutes: 15

      - name: Generate build metadata
        id: meta
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(Get-Date -Format yyyy-MM-ddTHH:mm:ssZ)" >> $GITHUB_OUTPUT
          echo "version=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
        shell: pwsh

      - name: Create release archive
        run: |
          Compress-Archive -Path ".build/VSCode-${{ inputs.platform || 'win32-x64' }}/*" -DestinationPath "cod-${{ inputs.platform || 'win32-x64' }}-${{ steps.meta.outputs.version }}.zip"
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cod-${{ inputs.platform || 'win32-x64' }}-${{ steps.meta.outputs.version }}
          path: |
            .build/VSCode-${{ inputs.platform || 'win32-x64' }}/
            cod-${{ inputs.platform || 'win32-x64' }}-*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: COD ${{ needs.generate-changelog.outputs.version }}
          body: ${{ needs.generate-changelog.outputs.changelog }}
          files: |
            cod-${{ inputs.platform || 'win32-x64' }}-*.zip
          draft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failed: ${{ inputs.platform || 'win32-x64' }} (${{ steps.meta.outputs.version }})`,
              body: `Build failed for platform \`${{ inputs.platform || 'win32-x64' }}\` at commit \`${{ steps.meta.outputs.version }}\`.\n\nSee [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`,
              labels: ['build', 'automated']
            });

      - name: Cleanup old artifacts
        if: always()
        run: |
          Remove-Item -Recurse -Force ".build/VSCode-${{ inputs.platform || 'win32-x64' }}" -ErrorAction SilentlyContinue
        shell: pwsh
